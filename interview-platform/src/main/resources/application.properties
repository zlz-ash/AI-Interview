spring.config.import=optional:classpath:templates/application-local.properties

spring.application.name=interview-platform

# RustFS / S3 兼容存储
app.storage.endpoint=http://localhost:9000
app.storage.access-key=${RUSTFS_ACCESS_KEY}
app.storage.secret-key=${RUSTFS_SECRET_KEY}
app.storage.bucket=interview-guide
app.storage.region=us-east-1

# ========== Chat：OpenRouter ==========
# base-url 已含 /api/v1；默认 completions-path 为 /v1/chat/completions，会拼成双 /v1 并命中站点 404（HTML）
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.chat.options.model=qwen/qwen3.6-plus:free
# 可选
spring.ai.openai.chat.options.temperature=0.7

# ========== Embedding：阿里云 DashScope ==========
spring.ai.openai.embedding.base-url=https://dashscope.aliyuncs.com/compatible-mode
spring.ai.openai.embedding.api-key=${DASHSCOPE_API_KEY}
spring.ai.openai.embedding.options.model=text-embedding-v3

# ========== 重试（可选）==========
spring.ai.retry.max-attempts=1
spring.ai.retry.on-client-errors=false

# ========== PostgreSQL Vector Store (pgvector) ==========
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.remove-existing-vector-store-table=false

# Redis 连接（Redisson 会据此创建客户端）
spring.data.redis.host=localhost
spring.data.redis.port=6379
# 有密码时取消注释并填写
# spring.data.redis.password=你的密码

app.ai.structured-max-attempts=2
app.ai.structured-include-last-error=true

# 认证鉴权（JWT）
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:0123456789abcdef0123456789abcdef}
app.auth.jwt-issuer=interview-platform
app.auth.access-token-minutes=30
app.auth.remember-me-token-days=7
app.auth.users[0].username=${APP_AUTH_USERNAME}
app.auth.users[0].password=${APP_AUTH_PASSWORD}
app.auth.users[0].roles[0]=ADMIN

# 评估动态分批策略
app.interview.evaluation.batch.min-size=4
app.interview.evaluation.batch.max-size=8
app.interview.evaluation.batch.max-batches=8
app.interview.evaluation.batch.single-upper-bound=6
app.interview.evaluation.batch.double-upper-bound=15
app.interview.evaluation.batch.large-upper-bound=30

# ========== PostgreSQL（JPA + pgvector 共用）==========
spring.datasource.url=jdbc:postgresql://localhost:5432/interview_db
spring.jpa.hibernate.ddl-auto=update

spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration